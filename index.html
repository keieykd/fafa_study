const b = s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(){
  const pw = document.getElementById('pw').value;
  if(!pw) return;
  const btn = document.getElementById('go'); btn.disabled = true;
  document.getElementById('err').textContent = '解密中…';
  try{
    const km = await crypto.subtle.importKey('raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt:b(P.salt), iterations:P.iter, hash:'SHA-256'},
      km, {name:'AES-GCM', length:256}, false, ['decrypt']);
    const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:b(P.iv)}, key, b(P.ct));
    const html = new TextDecoder().decode(pt);
    document.open(); document.write(html); document.close();
  }catch(e){
    document.getElementById('err').textContent = '密碼錯誤，請再試一次';
    btn.disabled = false;
  }
}
document.getElementById('go').onclick = unlock;
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') unlock(); });
